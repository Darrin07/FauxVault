name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fauxvault
          POSTGRES_USER: fauxvault_user
          POSTGRES_PASSWORD: fauxvault_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fauxvault_user -d fauxvault"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      POSTGRES_DB: fauxvault
      POSTGRES_USER: fauxvault_user
      POSTGRES_PASSWORD: fauxvault_pass
      DB_HOST: localhost
      DB_PORT: 5432
      JWT_SECRET: ci-test-secret
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: psql -h "$DB_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f
          ../database/FauxVault_Schema.sql
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: Seed database
        run: psql -h "$DB_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f
          ../database/FauxVault_Seed.sql
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "echo ==> Checking .env exists...",
              "if [ ! -f ${{ secrets.EC2_APP_DIR }}/.env ]; then echo ERROR: .env missing; exit 1; fi",
              "echo ==> Pulling latest code...",
              "cd ${{ secrets.EC2_APP_DIR }}",
              "git pull origin main",
              "echo ==> Rebuilding containers...",
              "export DOCKER_BUILDKIT=0",
              "docker-compose down",
              "docker-compose up -d --build",
              "echo ==> Waiting for app to start...",
              "sleep 10",
              "echo ==> Health check...",
              "curl -f http://localhost/api/health || (echo ERROR: Health check failed && exit 1)",
              "echo ==> Deployment successful"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }}

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query "StandardOutputContent" \
            --output text
