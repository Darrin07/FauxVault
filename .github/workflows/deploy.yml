name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fauxvault
          POSTGRES_USER: fauxvault_user
          POSTGRES_PASSWORD: fauxvault_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fauxvault_user -d fauxvault"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DB: fauxvault
      POSTGRES_USER: fauxvault_user
      POSTGRES_PASSWORD: fauxvault_pass
      DB_HOST: localhost
      DB_PORT: 5432
      JWT_SECRET: ci-test-secret
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: psql -h "$DB_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f ../database/FauxVault_Schema.sql
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: Seed database
        run: psql -h "$DB_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f ../database/FauxVault_Seed.sql
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "==> Checking .env exists..."
            if [ ! -f ${{ secrets.EC2_APP_DIR }}/.env ]; then
              echo "ERROR: .env file missing. Aborting deployment."
              exit 1
            fi

            echo "==> Pulling latest code..."
            cd ${{ secrets.EC2_APP_DIR }}
            git pull origin main

            echo "==> Rebuilding and restarting containers..."
            export DOCKER_BUILDKIT=0
            docker-compose down
            docker-compose up -d --build

            echo "==> Waiting for app to start..."
            sleep 10

            echo "==> Health check..."
            curl -f http://localhost/api/health || (echo "ERROR: Health check failed" && exit 1)

            echo "==> Deployment successful"
