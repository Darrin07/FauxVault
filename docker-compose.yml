version: '3.8'

services:
  app:
    build: ./server
    env_file:
       - .env
    ports:
      - "80:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=development
      - JWT_EXPIRES_IN=24h
      - BCRYPT_SALT_ROUNDS=10
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules

  db:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: